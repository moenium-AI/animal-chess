<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どうぶつチェス 🐱♟️</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/png" href="favicon.png">
<!-- ?v= は更新時にキャッシュを確実に切り替えるための版数。中身を変えたら数字を増やす -->
<link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>

<header class="app-header">
  <h1>🐱 どうぶつチェス <span class="sub">Animal Chess</span></h1>
  <div class="header-btns">
    <button id="btn-bgm" class="icon-btn" title="BGM切り替え">🎵</button>
    <button id="btn-sound" class="icon-btn" title="効果音切り替え">🔊</button>
  </div>
</header>

<main class="layout">

  <!-- 左: 盤面エリア -->
  <section class="board-col">
    <div id="venue-top" class="venue">
      <div class="venue-title"></div>
      <div class="venue-guests"></div>
    </div>

    <div class="board-wrap" id="board-wrap">
      <div id="board" class="board"></div>
      <div id="overlay" class="overlay"></div>
    </div>

    <div id="venue-bottom" class="venue">
      <div class="venue-title"></div>
      <div class="venue-guests"></div>
    </div>

    <div id="status-bar" class="status-bar"></div>

    <!-- 学習・棋譜再生の解説パネル(盤の下・どのタブから開いても共通) -->
    <div id="study-panel" class="study-panel hidden">
      <div class="study-head">
        <span id="study-title" class="study-title"></span>
        <button id="btn-study-close" class="icon-btn small" title="とじる">✖</button>
      </div>
      <div id="study-meta" class="study-meta"></div>
      <div id="study-note" class="study-note"></div>
      <div class="study-nav">
        <button id="btn-replay-first" class="btn small" title="さいしょ">⏮</button>
        <button id="btn-replay-prev" class="btn small" title="まえ">◀</button>
        <span id="replay-counter" class="replay-counter">0 / 0</span>
        <button id="btn-replay-next" class="btn small" title="つぎ">▶</button>
        <button id="btn-replay-last" class="btn small" title="さいご">⏭</button>
        <button id="btn-replay-play" class="btn primary">🎮 ここから対局</button>
      </div>
      <ol id="replay-movelist" class="movelist study-moves"></ol>
    </div>
  </section>

  <!-- 右: 情報列 -->
  <div class="side-col">

    <!-- 右上: 設定カード -->
    <section class="panel card-settings">
      <nav class="tabs">
        <button class="tab active" data-tab="settings" data-group="ctrl">⚙️ 設定</button>
        <button class="tab" data-tab="puzzle" data-group="ctrl">🧩 パズル</button>
        <button class="tab" data-tab="learn" data-group="ctrl">🎓 まなぶ</button>
      </nav>

      <!-- 設定 -->
      <div id="tab-settings" class="tab-page active" data-group="ctrl">
        <div class="settings">
          <label>グラフィック
            <select id="sel-view">
              <option value="3d">3Dモード(ドット絵)</option>
              <option value="simple">シンプルモード</option>
            </select>
          </label>
          <label id="row-set">ピースのデザイン
            <select id="sel-set"></select>
          </label>
          <label>あいて
            <select id="sel-opponent">
              <option value="cpu">コンピューター</option>
              <option value="2p">ふたりで遊ぶ</option>
            </select>
          </label>
          <label id="row-level">コンピューターの強さ(1〜10)
            <select id="sel-level">
              <option value="1">Lv1 はじめて</option>
              <option value="2">Lv2 とてもやさしい</option>
              <option value="3">Lv3 やさしい</option>
              <option value="4" selected>Lv4 すこしやさしい</option>
              <option value="5">Lv5 ふつう</option>
              <option value="6">Lv6 すこしつよい</option>
              <option value="7">Lv7 つよい</option>
              <option value="8">Lv8 かなりつよい</option>
              <option value="9">Lv9 とてもつよい</option>
              <option value="10">Lv10 さいきょう</option>
            </select>
          </label>
          <label id="row-color">じぶんの色
            <select id="sel-color">
              <option value="w">しろ(先手)</option>
              <option value="b">くろ(後手)</option>
            </select>
          </label>
          <label>BGM
            <select id="sel-bgm"></select>
          </label>
          <label class="check-line"><input type="checkbox" id="chk-badges"> コマの種類記号を表示</label>
        </div>
        <div class="btn-row">
          <button id="btn-new" class="btn primary">🌱 新しいゲーム</button>
          <button id="btn-hint" class="btn">💡 ヒント</button>
          <button id="btn-undo" class="btn">↩️ 待った</button>
          <button id="btn-copy-pgn" class="btn">📋 棋譜コピー</button>
        </div>
      </div>

      <!-- パズル -->
      <div id="tab-puzzle" class="tab-page" data-group="ctrl">
        <div id="puzzle-info" class="puzzle-info">
          <div id="puzzle-title" class="puzzle-title"></div>
          <div id="puzzle-goal" class="puzzle-goal"></div>
        </div>
        <div class="btn-row">
          <button id="btn-puzzle-retry" class="btn">🔄 さいしょから</button>
          <button id="btn-puzzle-hint" class="btn">💡 ヒント</button>
        </div>
        <div id="puzzle-cats" class="chip-row"></div>
        <div id="puzzle-list" class="puzzle-list"></div>
      </div>

      <!-- まなぶ(オープニング/コンビネーション/エンドゲーム) -->
      <div id="tab-learn" class="tab-page" data-group="ctrl">
        <p class="hint-text">テーマを選ぶと、一手ずつ「なぜそう指すのか」を解説つきで学べます</p>
        <div id="learn-cats" class="chip-row"></div>
        <div id="learn-list" class="study-list"></div>
      </div>
    </section>

    <!-- 右下: 棋譜カード -->
    <section class="panel card-kifu">
      <nav class="tabs">
        <button class="tab active" data-tab="game" data-group="kifu">📜 この対局</button>
        <button class="tab" data-tab="games" data-group="kifu">🏆 名局</button>
        <button class="tab" data-tab="load" data-group="kifu">📥 よみこみ</button>
      </nav>

      <!-- この対局の棋譜 -->
      <div id="tab-game" class="tab-page active" data-group="kifu">
        <div class="movelist-wrap tall">
          <div class="movelist-title">きふ</div>
          <ol id="movelist" class="movelist"></ol>
        </div>
      </div>

      <!-- 名局(歴史的な名勝負を解説つきで) -->
      <div id="tab-games" class="tab-page" data-group="kifu">
        <p class="hint-text">歴史に残る名勝負を、一手ずつ独自の解説つきで鑑賞できます</p>
        <div id="games-list" class="study-list tall"></div>
      </div>

      <!-- 棋譜よみこみ -->
      <div id="tab-load" class="tab-page" data-group="kifu">
        <p class="hint-text">PGN形式の棋譜を貼り付けるか、ファイルを選んでね</p>
        <textarea id="pgn-input" rows="5" placeholder="1. e4 e5 2. Nf3 Nc6 ..."></textarea>
        <div class="btn-row">
          <button id="btn-load-pgn" class="btn primary">📥 読み込み</button>
          <label class="btn file-btn">📂 ファイル<input type="file" id="pgn-file" accept=".pgn,.txt" hidden></label>
          <button id="btn-sample-pgn" class="btn">✨ サンプル棋譜</button>
        </div>
        <p class="hint-text">読み込むと盤の下に再生パネルが出ます。手をクリックすればどこからでも再生できます。</p>
      </div>
    </section>

  </div>
</main>

<!-- トースト表示 -->
<div id="toast-area" class="toast-area"></div>

<!-- プロモーション選択 -->
<div id="promo-modal" class="modal hidden">
  <div class="modal-box">
    <p>どのコマにへんしんする?</p>
    <div id="promo-choices" class="promo-choices"></div>
  </div>
</div>

<!-- ゲーム終了 -->
<div id="gameover-modal" class="modal hidden">
  <div class="modal-box">
    <div id="gameover-emoji" class="gameover-emoji"></div>
    <p id="gameover-text"></p>
    <div class="btn-row center">
      <button id="btn-gameover-close" class="btn">とじる</button>
      <button id="btn-gameover-new" class="btn primary">もういちど!</button>
    </div>
  </div>
</div>

<script src="js/chess.js?v=2"></script>
<script src="js/pieces.js?v=9"></script>
<script src="js/sprite_data.js?v=9"></script>
<script src="js/sprites.js?v=9"></script>
<script src="js/bgm.js?v=9"></script>
<script src="js/puzzles.js?v=9"></script>
<script src="js/lessons.js?v=9"></script>
<script src="js/games.js?v=9"></script>
<script src="js/engine.js?v=14"></script>
<script src="js/app.js?v=9"></script>
</body>
</html>
